<body>
    <div class="game-container">
        <h1>TIC TAC TOE</h1>
        
        <div class="score-panel">
            <div class="score-card player">
                <div class="score-label">YOU</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-card ai">
                <div class="score-label">AI</div>
                <div class="score-value" id="aiScore">0</div>
            </div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="status-area">
            <div class="status-text" id="statusMessage">YOUR TURN</div>
        </div>

        <button class="new-game-btn" id="newGameBtn">NEW GAME</button>
    </div>

    <script>
        (function() {
            // DOM elements
            const boardElement = document.getElementById('board');
            const cells = document.querySelectorAll('.cell');
            const playerScoreSpan = document.getElementById('playerScore');
            const aiScoreSpan = document.getElementById('aiScore');
            const statusMessage = document.getElementById('statusMessage');
            const newGameBtn = document.getElementById('newGameBtn');

            // Game state
            let board = Array(9).fill('');
            let currentPlayer = 'X';
            let gameActive = true;
            let isAIPlaying = false;
            let playerScore = 0;
            let aiScore = 0;
            let boardLocked = false;

            // Win patterns
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            // Update UI
            function updateUI() {
                cells.forEach((cell, index) => {
                    const value = board[index];
                    cell.classList.remove('x', 'o', 'winning');
                    if (value === 'X') {
                        cell.classList.add('x');
                        cell.textContent = 'X';
                    } else if (value === 'O') {
                        cell.classList.add('o');
                        cell.textContent = 'O';
                    } else {
                        cell.textContent = '';
                    }
                });
                
                playerScoreSpan.textContent = playerScore;
                aiScoreSpan.textContent = aiScore;
            }

            // Add glow animation
            function addGlow(cellElement) {
                cellElement.classList.add('glow');
                setTimeout(() => {
                    cellElement.classList.remove('glow');
                }, 400);
            }

            // Check winner
            function checkWinner() {
                for (const pattern of winPatterns) {
                    const [a, b, c] = pattern;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return { winner: board[a], pattern: pattern };
                    }
                }
                return null;
            }

            // Check draw
            function checkDraw() {
                return board.every(cell => cell !== '');
            }

            // Highlight winning cells
            function highlightWinners(pattern) {
                pattern.forEach(index => {
                    cells[index].classList.add('winning');
                });
            }

            // End game
            function endGame(winner) {
                gameActive = false;
                boardLocked = true;
                
                if (winner === 'X') {
                    playerScore++;
                    statusMessage.textContent = 'YOU WIN!';
                    statusMessage.className = 'status-text win';
                    updateUI();
                } else if (winner === 'O') {
                    aiScore++;
                    statusMessage.textContent = 'AI WINS!';
                    statusMessage.className = 'status-text win';
                    updateUI();
                } else {
                    statusMessage.textContent = 'GAME DRAW!';
                    statusMessage.className = 'status-text draw';
                    updateUI();
                    return;
                }
                
                updateUI();
            }

            // Make move
            function makeMove(index, player, withGlow = true) {
                if (!gameActive || board[index] !== '' || boardLocked) return false;
                if ((player === 'X' && currentPlayer !== 'X') || (player === 'O' && currentPlayer !== 'O')) return false;
                
                board[index] = player;
                updateUI();
                
                if (withGlow) {
                    addGlow(cells[index]);
                }
                
                const winResult = checkWinner();
                if (winResult) {
                    highlightWinners(winResult.pattern);
                    endGame(winResult.winner);
                    return true;
                }
                
                if (checkDraw()) {
                    endGame(null);
                    return true;
                }
                
                currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
                
                if (currentPlayer === 'X') {
                    statusMessage.textContent = 'YOUR TURN';
                    statusMessage.className = 'status-text player-turn';
                } else {
                    statusMessage.textContent = 'AI TURN';
                    statusMessage.className = 'status-text ai-turn';
                }
                
                return true;
            }

            // Smart AI move
            function getBestMove(player) {
                for (const pattern of winPatterns) {
                    const [a, b, c] = pattern;
                    const values = [board[a], board[b], board[c]];
                    const emptyIndexes = [];
                    
                    for (let i = 0; i < 3; i++) {
                        if (values[i] === '') {
                            emptyIndexes.push([a, b, c][i]);
                        } else if (values[i] !== player) {
                            emptyIndexes.length = 0;
                            break;
                        }
                    }
                    
                    if (emptyIndexes.length === 1) {
                        return emptyIndexes[0];
                    }
                }
                return -1;
            }

            // AI move with delay
            async function aiMove() {
                if (!gameActive || currentPlayer !== 'O' || isAIPlaying || boardLocked) return;
                
                isAIPlaying = true;
                statusMessage.textContent = 'AI THINKING';
                statusMessage.className = 'status-text ai-turn';
                
                await new Promise(resolve => setTimeout(resolve, 300));
                
                if (!gameActive || currentPlayer !== 'O' || boardLocked) {
                    isAIPlaying = false;
                    return;
                }
                
                let moveIndex = -1;
                
                moveIndex = getBestMove('O');
                
                if (moveIndex === -1) {
                    moveIndex = getBestMove('X');
                }
                
                if (moveIndex === -1 && board[4] === '') {
                    moveIndex = 4;
                }
                
                if (moveIndex === -1) {
                    const corners = [0, 2, 6, 8];
                    const availableCorners = corners.filter(i => board[i] === '');
                    if (availableCorners.length > 0) {
                        moveIndex = availableCorners[Math.floor(Math.random() * availableCorners.length)];
                    }
                }
                
                if (moveIndex === -1) {
                    const available = board.map((val, idx) => val === '' ? idx : null).filter(v => v !== null);
                    if (available.length > 0) {
                        moveIndex = available[Math.floor(Math.random() * available.length)];
                    }
                }
                
                if (moveIndex !== -1 && gameActive) {
                    makeMove(moveIndex, 'O', true);
                }
                
                isAIPlaying = false;
            }

            // Handle cell click
            function handleCellClick(event) {
                const index = parseInt(event.currentTarget.dataset.index);
                
                if (!gameActive || currentPlayer !== 'X' || board[index] !== '' || boardLocked || isAIPlaying) {
                    return;
                }
                
                const success = makeMove(index, 'X', true);
                
                if (success && gameActive && currentPlayer === 'O' && !boardLocked) {
                    setTimeout(() => aiMove(), 200);
                }
            }

            // New game
            function newGame() {
                board = Array(9).fill('');
                currentPlayer = 'X';
                gameActive = true;
                boardLocked = false;
                isAIPlaying = false;
                statusMessage.textContent = 'YOUR TURN';
                statusMessage.className = 'status-text player-turn';
                updateUI();
            }

            // Reset scores
            function resetScores() {
                playerScore = 0;
                aiScore = 0;
                newGame();
            }

            // Event listeners
            cells.forEach(cell => {
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleCellClick(e);
                });
            });
            
            newGameBtn.addEventListener('click', () => {
                newGame();
            });
            
            // Long press reset scores on new game button
            let pressTimer;
            newGameBtn.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    resetScores();
                    const btn = e.currentTarget;
                    btn.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        btn.style.transform = '';
                    }, 200);
                }, 800);
            });
            
            newGameBtn.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
            });
            
            newGameBtn.addEventListener('mousedown', () => {
                pressTimer = setTimeout(() => {
                    resetScores();
                }, 800);
            });
            
            newGameBtn.addEventListener('mouseup', () => {
                clearTimeout(pressTimer);
            });

            // Initialize
            updateUI();
            statusMessage.textContent = 'YOUR TURN';
            statusMessage.className = 'status-text player-turn';
        })();
    </script>

                if (checkDraw()) {
                    endGame(null);
                    return true;
                }
                
                currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
                
                if (currentPlayer === 'X') {
                    statusMessage.textContent = 'YOUR TURN';
                    statusMessage.className = 'status-text player-turn';
                } else {
                    statusMessage.textContent = 'AI TURN';
                    statusMessage.className = 'status-text ai-turn';
                }
                
                return true;
            }

            // Smart AI move
            function getBestMove(player) {
                for (const pattern of winPatterns) {
                    const [a, b, c] = pattern;
                    const values = [board[a], board[b], board[c]];
                    const emptyIndexes = [];
                    
                    for (let i = 0; i < 3; i++) {
                        if (values[i] === '') {
                            emptyIndexes.push([a, b, c][i]);
                        } else if (values[i] !== player) {
                            emptyIndexes.length = 0;
                            break;
                        }
                    }
                    
                    if (emptyIndexes.length === 1) {
                        return emptyIndexes[0];
                    }
                }
                return -1;
            }

            // AI move with delay
            async function aiMove() {
                if (!gameActive || currentPlayer !== 'O' || isAIPlaying || boardLocked) return;
                
                isAIPlaying = true;
                statusMessage.textContent = 'AI THINKING';
                statusMessage.className = 'status-text ai-turn';
                
                await new Promise(resolve => setTimeout(resolve, 300));
                
                if (!gameActive || currentPlayer !== 'O' || boardLocked) {
                    isAIPlaying = false;
                    return;
                }
                
                let moveIndex = -1;
                
                moveIndex = getBestMove('O');
                
                if (moveIndex === -1) {
                    moveIndex = getBestMove('X');
                }
                
                if (moveIndex === -1 && board[4] === '') {
                    moveIndex = 4;
                }
                
                if (moveIndex === -1) {
                    const corners = [0, 2, 6, 8];
                    const availableCorners = corners.filter(i => board[i] === '');
                    if (availableCorners.length > 0) {
                        moveIndex = availableCorners[Math.floor(Math.random() * availableCorners.length)];
                    }
                }
                
                if (moveIndex === -1) {
                    const available = board.map((val, idx) => val === '' ? idx : null).filter(v => v !== null);
                    if (available.length > 0) {
                        moveIndex = available[Math.floor(Math.random() * available.length)];
                    }
                }
                
                if (moveIndex !== -1 && gameActive) {
                    makeMove(moveIndex, 'O', true);
                }
                
                isAIPlaying = false;
            }

            // Handle cell click
            function handleCellClick(event) {
                const index = parseInt(event.currentTarget.dataset.index);
                
                if (!gameActive || currentPlayer !== 'X' || board[index] !== '' || boardLocked || isAIPlaying) {
                    return;
                }
                
                const success = makeMove(index, 'X', true);
                
                if (success && gameActive && currentPlayer === 'O' && !boardLocked) {
                    setTimeout(() => aiMove(), 200);
                }
            }

            // New game
            function newGame() {
                board = Array(9).fill('');
                currentPlayer = 'X';
                gameActive = true;
                boardLocked = false;
                isAIPlaying = false;
                statusMessage.textContent = 'YOUR TURN';
                statusMessage.className = 'status-text player-turn';
                updateUI();
            }

            // Reset scores
            function resetScores() {
                playerScore = 0;
                aiScore = 0;
                newGame();
            }

            // Event listeners
            cells.forEach(cell => {
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleCellClick(e);
                });
            });
            
            newGameBtn.addEventListener('click', () => {
                newGame();
            });
            
            // Long press reset scores on new game button
            let pressTimer;
            newGameBtn.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    resetScores();
                    const btn = e.currentTarget;
                    btn.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        btn.style.transform = '';
                    }, 200);
                }, 800);
            });
            
            newGameBtn.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
            });
            
            newGameBtn.addEventListener('mousedown', () => {
                pressTimer = setTimeout(() => {
                    resetScores();
                }, 800);
            });
            
            newGameBtn.addEventListener('mouseup', () => {
                clearTimeout(pressTimer);
            });

            // Initialize
            updateUI();
            statusMessage.textContent = 'YOUR TURN';
            statusMessage.className = 'status-text player-turn';
        })();
    </script>
</body>
</html>
